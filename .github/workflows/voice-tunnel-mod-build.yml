name: Build Voice Tunnel Mod (manual)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build Voice Tunnel Mod
        run: bash "Voice Tunnel Mod/build.sh"

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: voice-tunnel-mod-jar
          path: "Voice Tunnel Mod/build/libs/voice-tunnel-mod.jar"
          if-no-files-found: error
